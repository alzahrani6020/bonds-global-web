<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — Bonds</title>
  <link rel="stylesheet" href="../../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="../../assets/bonds-mark.svg" />
  <style>
    :root{--gold:#c8a45c;--gold-light:#f5efe3;--bg:#0c0c0c;--bg-card:#141414;--bg-elevated:#1c1c1c;--border:#2a2a2a;--text:#f5f5f5;--text-secondary:#9a9a9a;--radius-lg:16px;--radius-md:10px;--space-3:12px;--space-4:16px;--space-6:24px;--space-8:32px;--space-10:40px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Tajawal','Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--space-4)}
    .auth-container{width:100%;max-width:420px}
    .auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-8) var(--space-6)}
    .logo{display:flex;align-items:center;justify-content:center;gap:var(--space-3);margin-bottom:var(--space-8)}
    .logo img{height:40px}
    .logo span{font-weight:800;font-size:1.4rem;color:var(--gold);letter-spacing:-0.5px}
    .tabs{display:flex;gap:var(--space-3);margin-bottom:var(--space-6);border-bottom:1px solid var(--border);padding-bottom:var(--space-3)}
    .tab-btn{flex:1;background:transparent;border:none;color:var(--text-secondary);padding:var(--space-3);font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;border-radius:var(--radius-md);transition:all 0.2s}
    .tab-btn.active{background:var(--gold);color:#0c0c0c}
    .tab-btn:hover:not(.active){color:var(--text)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .form-group{margin-bottom:var(--space-4)}
    .form-group label{display:block;margin-bottom:var(--space-3);font-size:0.9rem;font-weight:500;color:var(--text-secondary)}
    .form-group input{width:100%;padding:var(--space-3) var(--space-4);background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);font-family:inherit;font-size:1rem;transition:border-color 0.2s}
    .form-group input:focus{outline:none;border-color:var(--gold)}
    .form-group input::placeholder{color:#666}
    .btn{width:100%;padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;border:none;transition:all 0.2s}
    .btn-primary{background:var(--gold);color:#0c0c0c}
    .btn-primary:hover{background:#d4b76a;transform:translateY(-1px)}
    .btn-secondary{background:var(--bg-elevated);color:var(--text);border:1px solid var(--border)}
    .btn-secondary:hover{border-color:var(--gold)}
    .divider{display:flex;align-items:center;gap:var(--space-4);margin:var(--space-6) 0;color:var(--text-secondary);font-size:0.85rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .error-msg{background:#3a1515;color:#ff8a8a;padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);margin-bottom:var(--space-4);font-size:0.9rem;display:none}
    .success-msg{background:#153a1f;color:#8affa0;padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);margin-bottom:var(--space-4);font-size:0.9rem;display:none}
    .link{color:var(--gold);text-decoration:none;font-weight:600}
    .link:hover{text-decoration:underline}
    .back-link{display:block;text-align:center;margin-top:var(--space-6);color:var(--text-secondary);font-size:0.9rem}
    @media(max-width:480px){.auth-card{padding:var(--space-6) var(--space-4)}}
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <img src="../../assets/bonds-logo-opt.jpg" alt="Bonds" />
        <span>Bonds</span>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="login">تسجيل الدخول</button>
        <button class="tab-btn" data-tab="signup">حساب جديد</button>
      </div>

      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <!-- Login Panel -->
      <div id="loginPanel" class="tab-panel active">
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">البريد الإلكتروني</label>
            <input type="email" id="loginEmail" required placeholder="your@email.com" dir="ltr" />
          </div>
          <div class="form-group">
            <label for="loginPassword">كلمة المرور</label>
            <input type="password" id="loginPassword" required placeholder="••••••••" dir="ltr" />
          </div>
          <button type="submit" class="btn btn-primary">تسجيل الدخول</button>
        </form>
        <div class="divider">أو</div>
        <button id="otpBtn" class="btn btn-secondary">إرسال رابط سحري 📧</button>
      </div>

      <!-- Signup Panel -->
      <div id="signupPanel" class="tab-panel">
        <form id="signupForm">
          <div class="form-group">
            <label for="signupName">اسم المطعم / الشركة</label>
            <input type="text" id="signupName" required placeholder="مثال: مطعم الذواقة" />
          </div>
          <div class="form-group">
            <label for="signupEmail">البريد الإلكتروني</label>
            <input type="email" id="signupEmail" required placeholder="your@email.com" dir="ltr" />
          </div>
          <div class="form-group">
            <label for="signupPassword">كلمة المرور (8 أحرف على الأقل)</label>
            <input type="password" id="signupPassword" required minlength="8" placeholder="••••••••" dir="ltr" />
          </div>
          <div class="form-group">
            <label for="signupCountry">الدولة</label>
            <input type="text" id="signupCountry" placeholder="مثال: السعودية" />
          </div>
          <button type="submit" class="btn btn-primary">إنشاء حساب</button>
        </form>
      </div>

      <a href="../../calculator.html" class="back-link">← العودة للحاسبة</a>
    </div>
  </div>

  <!-- Env vars + Supabase -->
  <script src="/api/env"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../../api/supabase-client.js"></script>

  <script>
    // Env validation
    setTimeout(function(){
      var env = window.__ENV || {};
      if (!env.SUPABASE_URL || !env.SUPABASE_ANON_KEY) {
        var banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#5a1a1a;color:#ff8a8a;padding:12px;text-align:center;z-index:99999;font-size:0.9rem;font-family:Tajawal,sans-serif;';
        banner.innerHTML = '⚠️ لم يتم إعداد متغيرات البيئة (Environment Variables). يرجى مراجعة دليل النشر.';
        document.body.prepend(banner);
      }
    }, 500);
    (function() {
      'use strict';

      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.tab + 'Panel').classList.add('active');
          hideMessages();
        });
      });

      function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
      }
      function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
      }
      function hideMessages() {
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('successMsg').style.display = 'none';
      }

      // Check for redirect
      const urlParams = new URLSearchParams(window.location.search);
      const redirectTo = urlParams.get('redirect') || '../../calculator.html';

      // Login
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessages();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        const { data, error } = await window.BondsAuth.signIn(email, password);
        if (error) {
          showError(error.message === 'Invalid login credentials' ? 'البريد أو كلمة المرور غير صحيحة' : error.message);
          return;
        }
        showSuccess('تم تسجيل الدخول! جاري التوجيه...');
        if (typeof gtag !== 'undefined') gtag('event', 'login', { method: 'email' });
        setTimeout(() => window.location.href = redirectTo, 800);
      });

      // OTP Login
      document.getElementById('otpBtn').addEventListener('click', async () => {
        hideMessages();
        const email = document.getElementById('loginEmail').value.trim();
        if (!email) { showError('أدخل البريد الإلكتروني أولاً'); return; }

        const { error } = await window.BondsAuth.signInWithOTP(email);
        if (error) { showError(error.message); return; }
        showSuccess('تم إرسال رابط تسجيل الدخول إلى بريدك! تحقق من صندوق الوارد 📧');
      });

      // Signup
      document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessages();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const name = document.getElementById('signupName').value.trim();
        const country = document.getElementById('signupCountry').value.trim();

        if (password.length < 8) { showError('كلمة المرور يجب أن تكون 8 أحرف على الأقل'); return; }

        const { data, error } = await window.BondsAuth.signUp(email, password, {
          restaurant_name: name,
          country: country,
          language: 'ar'
        });

        if (error) { showError(error.message); return; }

        if (data?.session) {
          showSuccess('تم إنشاء الحساب! جاري التوجيه...');
          if (typeof gtag !== 'undefined') gtag('event', 'sign_up', { method: 'email' });
          setTimeout(() => window.location.href = redirectTo, 800);
        } else {
          showSuccess('تم إرسال رابط التفعيل إلى بريدك! تحقق من صندوق الوارد 📧');
        }
      });

      // Check if already logged in
      window.BondsAuth.getSession().then(({ data }) => {
        if (data?.session) {
          window.location.href = redirectTo;
        }
      });
    })();
  </script>
</body>
</html>
