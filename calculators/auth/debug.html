<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تشخيص — Bonds</title>
  <style>
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0c0c0c;color:#f5f5f5;padding:20px;line-height:1.6}
    .box{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:12px;padding:20px;margin-bottom:16px;max-width:800px;margin-left:auto;margin-right:auto}
    h2{color:#c8a45c;margin-top:0;font-size:1.1rem}
    pre{background:#141414;padding:12px;border-radius:8px;overflow-x:auto;font-size:0.85rem;color:#8affa0;white-space:pre-wrap;word-break:break-all}
    .err{color:#ff8a8a}
    .ok{color:#8affa0}
    .warn{color:#ffd700}
    img{max-width:100px;border-radius:50%;border:3px solid #c8a45c;margin-top:10px}
    button{background:#c8a45c;color:#0c0c0c;border:none;padding:12px 24px;border-radius:8px;font-weight:700;cursor:pointer;font-size:1rem}
    button:hover{opacity:0.9}
    .spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,0.2);border-top-color:#c8a45c;border-radius:50%;animation:spin 1s linear infinite;display:inline-block;vertical-align:middle;margin-left:10px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="box">
    <h2>🔍 تشخيص نظام Bonds</h2>
    <p>اضغط الزر وانتظر النتائج:</p>
    <button id="runBtn" onclick="runDiag()">بدء التشخيص</button>
    <span class="spinner" id="spin" style="display:none"></span>
  </div>
  <div id="results"></div>

  <script src="/api/env"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/supabase-client.js?v=5"></script>
  <script>
    async function runDiag() {
      document.getElementById('runBtn').disabled = true;
      document.getElementById('spin').style.display = 'inline-block';
      const out = document.getElementById('results');
      out.innerHTML = '';

      function add(title, content, isError) {
        const div = document.createElement('div');
        div.className = 'box';
        div.innerHTML = `<h2>${title}</h2><pre class="${isError ? 'err' : ''}">${content}</pre>`;
        out.appendChild(div);
      }

      try {
        // 1. Session
        const { data: sData } = await BondsAuth.getSession();
        const user = sData?.session?.user;
        if (!user) {
          add('❌ الجلسة', 'ما فيه مستمسك دخول! سجل دخولك أولاً.', true);
          return;
        }
        add('✅ المستخدم', `ID: ${user.id}\nEmail: ${user.email}\nMetadata.avatar_url: ${user.user_metadata?.avatar_url || '(فاضي)'}\nMetadata.restaurant_name: ${user.user_metadata?.restaurant_name || '(فاضي)'}`);

        // 2. localStorage
        add('💾 localStorage', `bonds_avatar_url: ${localStorage.getItem('bonds_avatar_url') || '(فاضي)'}\nbonds_restaurant_name: ${localStorage.getItem('bonds_restaurant_name') || '(فاضي)'}`);

        // 3. Profile from DB
        const { data: profile, error: pErr } = await BondsAuth.getProfile(user.id);
        if (pErr) {
          add('❌ جلب البروفايل', `خطأ: ${pErr.message}\nCode: ${pErr.code}`, true);
        } else if (!profile) {
          add('⚠️ البروفايل', 'ما فيه بروفايل في الداتابيس!', true);
        } else {
          add('✅ البروفايل من الداتابيس', `avatar_url: ${profile.avatar_url || '(فاضي)'}\nrestaurant_name: ${profile.restaurant_name || '(فاضي)'}\nphone: ${profile.phone || '(فاضي)'}\ncity: ${profile.city || '(فاضي)'}`);
        }

        // 4. Try loading avatar image
        const avatarUrl = profile?.avatar_url || user.user_metadata?.avatar_url || localStorage.getItem('bonds_avatar_url');
        if (avatarUrl) {
          const imgDiv = document.createElement('div');
          imgDiv.className = 'box';
          imgDiv.innerHTML = `<h2>🖼️ اختبار تحميل الصورة</h2><p>URL: ${avatarUrl}</p><img src="${avatarUrl}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" style="display:block"><p style="display:none;color:#ff8a8a">❌ الصورة ما تحملت (خطأ في الرابط أو الـ Bucket)</p>`;
          out.appendChild(imgDiv);

          // 5. Try authenticated download
          const pathMatch = avatarUrl.match(/\/avatars\/(.+)$/);
          if (pathMatch) {
            try {
              const sb = BondsAuth.getSupabase();
              const { data: blob, error: dErr } = await sb.storage.from('avatars').download(pathMatch[1]);
              if (dErr) {
                add('❌ تحميل من Storage', `خطأ: ${dErr.message}`, true);
              } else if (blob) {
                const blobUrl = URL.createObjectURL(blob);
                const div = document.createElement('div');
                div.className = 'box';
                div.innerHTML = `<h2>✅ تحميل مباشر (Authenticated)</h2><p>التحميل ناجح! Blob URL:</p><img src="${blobUrl}">`;
                out.appendChild(div);
              }
            } catch (e) {
              add('❌ تحميل من Storage', `استثناء: ${e.message}`, true);
            }
          }
        } else {
          add('⚠️ الصورة', 'ما فيه رابط صورة في أي مصدر (DB, metadata, localStorage)', true);
        }

      } catch (err) {
        add('❌ خطأ عام', err.message || String(err), true);
      } finally {
        document.getElementById('runBtn').disabled = false;
        document.getElementById('spin').style.display = 'none';
      }
    }
  </script>
</body>
</html>
