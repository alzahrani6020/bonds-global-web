<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إعادة تعيين كلمة المرور — Bonds</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="../../assets/bonds-mark.svg" />
  <style>
    :root{--gold:#c8a45c;--bg:#0c0c0c;--bg-card:#141414;--bg-elevated:#1c1c1c;--border:#2a2a2a;--text:#f5f5f5;--text-secondary:#9a9a9a;--radius-lg:16px;--radius-md:10px;--space-3:12px;--space-4:16px;--space-6:24px;--space-8:32px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Tajawal','Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--space-4)}
    .auth-container{width:100%;max-width:420px}
    .auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-8) var(--space-6)}
    .logo{display:flex;align-items:center;justify-content:center;gap:var(--space-3);margin-bottom:var(--space-8)}
    .logo img{height:40px}
    .logo span{font-weight:800;font-size:1.4rem;color:var(--gold)}
    .form-group{margin-bottom:var(--space-4)}
    .form-group label{display:block;margin-bottom:var(--space-3);font-size:0.9rem;font-weight:500;color:var(--text-secondary)}
    .form-group input{width:100%;padding:var(--space-3) var(--space-4);background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);font-family:inherit;font-size:1rem}
    .form-group input:focus{outline:none;border-color:var(--gold)}
    .btn{width:100%;padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;border:none;transition:all 0.2s}
    .btn-primary{background:var(--gold);color:#0c0c0c}
    .btn-primary:hover{background:#d4b76a}
    .error-msg{background:#3a1515;color:#ff8a8a;padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);margin-bottom:var(--space-4);font-size:0.9rem;display:none}
    .success-msg{background:#153a1f;color:#8affa0;padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);margin-bottom:var(--space-4);font-size:0.9rem;display:none}
    .back-link{display:block;text-align:center;margin-top:var(--space-6);color:var(--text-secondary);font-size:0.9rem;text-decoration:none}
    .back-link:hover{color:var(--gold)}
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <img src="../../assets/bonds-logo-opt.jpg" alt="Bonds" />
        <span>Bonds</span>
      </div>
      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>
      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword">كلمة المرور الجديدة</label>
          <input type="password" id="newPassword" required minlength="8" placeholder="8 أحرف على الأقل" dir="ltr" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">تأكيد كلمة المرور</label>
          <input type="password" id="confirmPassword" required placeholder="أعد كتابة كلمة المرور" dir="ltr" />
        </div>
        <button type="submit" class="btn btn-primary">تحديث كلمة المرور</button>
      </form>
      <a href="index.html" class="back-link">← العودة لتسجيل الدخول</a>
    </div>
  </div>

  <script src="/api/env"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/supabase-client.js?v=5"></script>
  <script>
    (function(){
      function showError(msg){var el=document.getElementById('errorMsg');el.textContent=msg;el.style.display='block';document.getElementById('successMsg').style.display='none';}
      function showSuccess(msg){var el=document.getElementById('successMsg');el.textContent=msg;el.style.display='block';document.getElementById('errorMsg').style.display='none';}

      document.getElementById('resetForm').addEventListener('submit',async function(e){
        e.preventDefault();
        var pw=document.getElementById('newPassword').value;
        var conf=document.getElementById('confirmPassword').value;
        if(pw.length<8){showError('كلمة المرور يجب أن تكون 8 أحرف على الأقل');return;}
        if(pw!==conf){showError('كلمة المرور غير متطابقة');return;}
        var sb=window.BondsAuth.getSupabase();
        if(!sb){showError('النظام غير جاهز');return;}
        var {error}=await sb.auth.updateUser({password:pw});
        if(error){showError(error.message);return;}
        showSuccess('تم تحديث كلمة المرور! جاري التوجيه...');
        setTimeout(function(){window.location.href='index.html';},1500);
      });
    })();
  </script>
</body>
</html>
