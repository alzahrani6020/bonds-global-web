<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>محرك هندسة المنيو | بوندز</title>
  <meta name="description" content="مصنف ذكي للمنيو يصنف الوجبات إلى نجوم، حصان رابح، ألغاز، وكلاب بناءً على بيانات المبيعات الفعلية." />
  <script src="/api/env"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase-client.js"></script>
  <script src="../auth-guard.js"></script>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" href="../assets/bonds-mark.svg" type="image/svg+xml" />
  <style>
    .me-container { max-width: 1200px; margin: 0 auto; padding: var(--space-8) var(--space-4); }
    .me-header { text-align: center; margin-bottom: var(--space-12); }
    .me-header h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900; color: var(--gold); margin-bottom: var(--space-4); }
    .me-header p { color: var(--text-secondary); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }
    .me-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: var(--space-6); margin-bottom: var(--space-12); }
    .me-quadrant { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-6); position: relative; overflow: hidden; }
    .me-quadrant::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
    .me-quadrant.star::before { background: linear-gradient(90deg, #22c55e, #16a34a); }
    .me-quadrant.plowhorse::before { background: linear-gradient(90deg, #f59e0b, #d97706); }
    .me-quadrant.puzzle::before { background: linear-gradient(90deg, #3b82f6, #2563eb); }
    .me-quadrant.dog::before { background: linear-gradient(90deg, #ef4444, #dc2626); }
    .me-quadrant h3 { font-size: 1.25rem; font-weight: 800; margin-bottom: var(--space-2); display: flex; align-items: center; gap: var(--space-2); }
    .me-quadrant .count { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
    .me-quadrant .items { margin-top: var(--space-4); display: flex; flex-direction: column; gap: var(--space-3); }
    .me-item { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-4); }
    .me-item .name { font-weight: 700; color: var(--text); margin-bottom: var(--space-1); }
    .me-item .meta { font-size: 0.85rem; color: var(--text-muted); display: flex; gap: var(--space-4); flex-wrap: wrap; }
    .me-item .badge { display: inline-block; font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; margin-top: var(--space-2); }
    .badge-profit { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge-loss { background: rgba(239,68,68,0.15); color: #ef4444; }
    .me-actions { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-8); max-width: 600px; margin: 0 auto var(--space-12); }
    .me-actions h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: var(--space-6); text-align: center; }
    .form-group { margin-bottom: var(--space-4); }
    .form-group label { display: block; font-weight: 600; margin-bottom: var(--space-2); color: var(--text-secondary); }
    .form-group input, .form-group select { width: 100%; padding: var(--space-3) var(--space-4); border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-secondary); color: var(--text); font-family: inherit; }
    .btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-dim)); color: #0a0f1a; font-weight: 800; border: none; padding: var(--space-3) var(--space-6); border-radius: var(--radius); cursor: pointer; width: 100%; font-size: 1rem; }
    .btn-primary:hover { filter: brightness(1.1); }
    .result-box { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-4); margin-top: var(--space-4); }
    .result-box h4 { color: var(--gold); margin-bottom: var(--space-2); }
    .result-box pre { white-space: pre-wrap; font-size: 0.9rem; color: var(--text-secondary); }
    .loading { text-align: center; color: var(--text-muted); padding: var(--space-8); }
    .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; padding: var(--space-4); border-radius: var(--radius); text-align: center; }
  </style>
</head>
<body>
  <div class="me-container">
    <div class="me-header">
      <h1>🎯 محرك هندسة المنيو</h1>
      <p>صنّف وجباتك بناءً على بيانات المبيعات الفعلية. اعرف النجوم التي تحافظ عليها، والكلاب التي تحذفها.</p>
    </div>

    <div id="matrixContainer">
      <div class="loading">جاري تحميل البيانات...</div>
    </div>

    <div class="me-actions">
      <h2>🧮 محاكاة سريعة</h2>
      <div class="form-group">
        <label>الوجبة</label>
        <select id="simItem">
          <option value="">اختر وجبة...</option>
        </select>
      </div>
      <div class="form-group">
        <label>المنصة</label>
        <select id="simPlatform">
          <option value="">اختر منصة...</option>
        </select>
      </div>
      <div class="form-group">
        <label>نسبة الخصم (%)</label>
        <input type="number" id="simDiscount" value="20" min="0" max="100" />
      </div>
      <div class="form-group">
        <label>المبيعات اليومية الحالية</label>
        <input type="number" id="simSales" value="50" min="1" />
      </div>
      <button class="btn-primary" onclick="runPromoSim()">احسب تأثير الحملة</button>
      <div id="simResult"></div>
    </div>
  </div>

<script>
const API_BASE = '/api';
let currentUser = null;
let menuItems = [];
let platforms = [];

async function init() {
  try {
    const { data: userData } = await window.BondsAuth.getUser();
    currentUser = userData?.user;
    if (!currentUser) {
      document.getElementById('matrixContainer').innerHTML =
        '<div class="error">يجب تسجيل الدخول لعرض هندسة المنيو. <a href="/calculators/auth/?redirect=' + encodeURIComponent(location.pathname) + '">تسجيل الدخول</a></div>';
      return;
    }
    await loadMatrix();
    await loadDropdowns();
  } catch (e) {
    document.getElementById('matrixContainer').innerHTML = '<div class="error">' + e.message + '</div>';
  }
}

async function loadMatrix() {
  const res = await fetch(`${API_BASE}/menu-engineering?user_id=${currentUser.id}`);
  const json = await res.json();
  if (!json.success) throw new Error(json.error);

  const data = json.data;
  const cats = {
    star: { icon: '⭐', title: 'النجوم (Stars)', desc: 'ربح عالٍ + مبيعات عالية', color: '#22c55e' },
    plowhorse: { icon: '🐴', title: 'الحصان الرابح (Plowhorses)', desc: 'مبيعات عالية + ربح منخفض', color: '#f59e0b' },
    puzzle: { icon: '🧩', title: 'الألغاز (Puzzles)', desc: 'ربح عالٍ + مبيعات منخفضة', color: '#3b82f6' },
    dog: { icon: '🐕', title: 'الكلاب (Dogs)', desc: 'ربح منخفض + مبيعات منخفضة', color: '#ef4444' }
  };

  let html = '<div class="me-grid">';
  for (const key of ['star', 'plowhorse', 'puzzle', 'dog']) {
    const c = cats[key];
    const items = data[key] || [];
    html += `<div class="me-quadrant ${key}">
      <h3>${c.icon} ${c.title} <span class="count">(${items.length})</span></h3>
      <p style="font-size:0.85rem;color:var(--text-muted);">${c.desc}</p>
      <div class="items">`;
    if (items.length === 0) {
      html += '<div class="me-item"><div class="meta">لا توجد وجبات في هذا القسم</div></div>';
    } else {
      for (const item of items) {
        const profit = item.gross_profit || 0;
        const margin = item.profit_margin_pct || 0;
        html += `<div class="me-item">
          <div class="name">${item.menu_item?.name || '—'}</div>
          <div class="meta">
            <span>💰 ${profit.toFixed(0)} ر.س ربح</span>
            <span>📈 ${margin.toFixed(1)}% هامش</span>
            <span>🛒 ${item.total_sales_count || 0} مبيعة</span>
          </div>
          ${item.recommendation ? `<div class="badge ${margin >= 0 ? 'badge-profit' : 'badge-loss'}">${item.recommendation}</div>` : ''}
        </div>`;
      }
    }
    html += '</div></div>';
  }
  html += '</div>';

  html += `<div style="text-align:center;color:var(--text-muted);margin-bottom:var(--space-12);">
    📊 إجمالي الوجبات: <strong style="color:var(--gold);">${data.summary.total_items}</strong> |
    متوسط الهامش: <strong style="color:var(--gold);">${data.summary.avg_margin}%</strong> |
    إجمالي الربح: <strong style="color:var(--gold);">${data.summary.total_profit} ر.س</strong>
  </div>`;

  document.getElementById('matrixContainer').innerHTML = html;
}

async function loadDropdowns() {
  const sb = window.BondsAuth.getSupabase();
  if (!sb) return;

  const { data: items } = await sb.from('menu_items').select('id,name').eq('user_id', currentUser.id);
  const { data: plats } = await sb.from('platforms').select('id,name').eq('user_id', currentUser.id);

  menuItems = items || [];
  platforms = plats || [];

  const itemSel = document.getElementById('simItem');
  for (const i of menuItems) {
    const opt = document.createElement('option');
    opt.value = i.id;
    opt.textContent = i.name;
    itemSel.appendChild(opt);
  }

  const platSel = document.getElementById('simPlatform');
  for (const p of platforms) {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name;
    platSel.appendChild(opt);
  }
}

async function runPromoSim() {
  const itemId = document.getElementById('simItem').value;
  const platId = document.getElementById('simPlatform').value;
  const discount = parseFloat(document.getElementById('simDiscount').value);
  const sales = parseInt(document.getElementById('simSales').value);
  const box = document.getElementById('simResult');

  if (!itemId || !platId || isNaN(discount) || isNaN(sales)) {
    box.innerHTML = '<div class="error">يرجى ملء جميع الحقول</div>';
    return;
  }

  box.innerHTML = '<div class="loading">جاري الحساب...</div>';

  try {
    const res = await fetch(`${API_BASE}/promo-simulator`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: currentUser.id,
        menu_item_id: itemId,
        platform_id: platId,
        discount_pct: discount,
        current_daily_sales: sales
      })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);

    const d = json.data;
    box.innerHTML = `
      <div class="result-box">
        <h4>🎯 نتيجة المحاكاة: ${d.item_name}</h4>
        <p><strong>السعر الأصلي:</strong> ${d.original_price} ر.س → <strong>بعد الخصم:</strong> ${d.discounted_price} ر.س</p>
        <p><strong>هامش الربح الأصلي:</strong> ${d.original_margin_pct}% → <strong>بعد الخصم:</strong> ${d.new_margin_pct}%</p>
        <hr style="border-color:var(--border);margin:var(--space-3) 0;">
        <p style="color:${d.is_profitable ? '#22c55e' : '#ef4444'};font-weight:700;">${d.verdict}</p>
      </div>
    `;
  } catch (e) {
    box.innerHTML = '<div class="error">' + e.message + '</div>';
  }
}

init();
</script>
</body>
</html>
